version: '3.8'

services:
  gamelog:
    build: .
    container_name: gamelog
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/gamelog.db
      - IGDB_CLIENT_ID=${IGDB_CLIENT_ID}
      - IGDB_CLIENT_SECRET=${IGDB_CLIENT_SECRET}
      - STEAM_API_KEY=${STEAM_API_KEY}
      - STEAM_ACCOUNT_ID=${STEAM_ACCOUNT_ID}
      - RAWG_API_KEY=${RAWG_API_KEY}
      - SWITCH_SESSION_TOKEN=${SWITCH_SESSION_TOKEN:-}
      - SWITCH_DEVICE_ID=${SWITCH_DEVICE_ID:-}
      - SWITCH_PLAYER_NAME=${SWITCH_PLAYER_NAME:-}
    volumes:
      - ./data:/app/data
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gamelog.rule=Host(`gamelog.home`)"
      - "traefik.http.routers.gamelog.entrypoints=web"
      - "traefik.http.services.gamelog.loadbalancer.server.port=3000"

networks:
  traefik_net:
    external: true
